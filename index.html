<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>机械选题雷达</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --text-xs:clamp(0.75rem,0.7rem + 0.25vw,0.875rem);
  --text-sm:clamp(0.875rem,0.8rem + 0.35vw,1rem);
  --text-base:clamp(1rem,0.95rem + 0.25vw,1.125rem);
  --text-lg:clamp(1.125rem,1rem + 0.75vw,1.5rem);
  --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
  --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;
  --space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;--space-12:3rem;--space-16:4rem;
  --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.75rem;--radius-xl:1rem;--radius-full:9999px;
  --trans:180ms cubic-bezier(0.16,1,0.3,1);
  --font-body:'Inter','PingFang SC',sans-serif;--font-mono:'JetBrains Mono',monospace;
}
[data-theme="dark"]{
  --bg:#0f1117;--surface:#161820;--surface2:#1c1e28;--surface3:#232535;--surface4:#2a2d40;
  --div:#2e3148;--bdr:#363a52;--text:#e2e4f0;--muted:#8b8fa8;--faint:#555870;
  --primary:#6c8cff;--phover:#8aa0ff;--phil:rgba(108,140,255,.12);
  --accent:#ff6b9d;--adim:rgba(255,107,157,.15);
  --ok:#4ade80;--okdim:rgba(74,222,128,.12);
  --warn:#fbbf24;--wdim:rgba(251,191,36,.12);
  --ora:#fb923c;--odim:rgba(251,146,60,.12);
  --sh1:0 1px 2px rgba(0,0,0,.3);--sh2:0 4px 16px rgba(0,0,0,.4);--sh3:0 12px 40px rgba(0,0,0,.5);
}
[data-theme="light"]{
  --bg:#f4f5f9;--surface:#fff;--surface2:#f9fafc;--surface3:#eef0f6;--surface4:#e5e8f0;
  --div:#dde0ec;--bdr:#c8ccdc;--text:#1a1c2e;--muted:#5a5e78;--faint:#9a9eb8;
  --primary:#3d5cff;--phover:#2442ee;--phil:rgba(61,92,255,.1);
  --accent:#e8196a;--adim:rgba(232,25,106,.1);
  --ok:#16a34a;--okdim:rgba(22,163,74,.1);
  --warn:#d97706;--wdim:rgba(217,119,6,.1);
  --ora:#ea580c;--odim:rgba(234,88,12,.1);
  --sh1:0 1px 2px rgba(0,0,0,.06);--sh2:0 4px 16px rgba(0,0,0,.08);--sh3:0 12px 40px rgba(0,0,0,.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-sm);
  color:var(--text);background:var(--bg);transition:background .3s,color .3s}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
a,button,[role="button"]{transition:color var(--trans),background var(--trans),
  border-color var(--trans),box-shadow var(--trans),opacity var(--trans)}
:focus-visible{outline:2px solid var(--primary);outline-offset:3px;border-radius:var(--radius-sm)}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}

/* chart tab */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-5)}
@media(max-width:768px){.chart-grid{grid-template-columns:1fr}}
.chart-wrap{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius-lg);padding:var(--space-5);box-shadow:var(--sh1)}
.chart-title{font-size:var(--text-sm);font-weight:700;margin-bottom:var(--space-4);display:flex;align-items:center;gap:var(--space-2)}
.chart-canvas-wrap{position:relative;height:280px}


/* LAYOUT */
.app{display:grid;grid-template-columns:230px 1fr;grid-template-rows:auto 1fr;min-height:100dvh}
.topbar{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;
  padding:var(--space-3) var(--space-6);border-bottom:1px solid var(--div);
  background:var(--surface);position:sticky;top:0;z-index:100;box-shadow:var(--sh1)}
.sidebar{background:var(--surface);border-right:1px solid var(--div);
  padding:var(--space-4) var(--space-3);display:flex;flex-direction:column;gap:var(--space-1);
  position:sticky;top:49px;height:calc(100dvh - 49px);overflow-y:auto}
.main{padding:var(--space-6);overflow-y:auto}

/* LOGO */
.logo{display:flex;align-items:center;gap:var(--space-2);text-decoration:none;color:var(--text)}
.logo-text{font-size:var(--text-sm);font-weight:700;letter-spacing:-.02em}
.logo-sub{font-size:var(--text-xs);color:var(--muted)}

/* NAV */
.nav-sec{margin-bottom:var(--space-5)}
.nav-lbl{font-size:var(--text-xs);color:var(--faint);font-weight:600;letter-spacing:.06em;
  text-transform:uppercase;padding:var(--space-1) var(--space-3);margin-bottom:var(--space-1)}
.nav-item{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-3);
  border-radius:var(--radius-md);font-size:var(--text-xs);color:var(--muted);cursor:pointer;width:100%;text-align:left}
.nav-item:hover{background:var(--surface3);color:var(--text)}
.nav-item.active{background:var(--phil);color:var(--primary);font-weight:500}
.nav-item i{width:15px;height:15px;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--primary);color:#fff;font-size:10px;font-weight:700;
  padding:1px 6px;border-radius:var(--radius-full)}
.topbar-right{display:flex;align-items:center;gap:var(--space-3)}
.btn-icon{width:32px;height:32px;border-radius:var(--radius-md);display:flex;align-items:center;
  justify-content:center;color:var(--muted);border:1px solid var(--bdr);background:var(--surface2)}
.btn-icon:hover{color:var(--text);background:var(--surface3)}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--ok);display:inline-block}
.sdot.loading{background:var(--warn);animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:var(--space-4);margin-bottom:var(--space-6)}
.kpi-card{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius-lg);padding:var(--space-4);box-shadow:var(--sh1)}
.kpi-lbl{font-size:var(--text-xs);color:var(--muted);font-weight:500;margin-bottom:var(--space-2);display:flex;align-items:center;gap:var(--space-1)}
.kpi-val{font-size:var(--text-xl);font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.kpi-sub{font-size:var(--text-xs);margin-top:var(--space-1);font-weight:500}

/* TABS */
.tabs{display:flex;gap:var(--space-1);border-bottom:1px solid var(--div);margin-bottom:var(--space-5)}
.tab{padding:var(--space-2) var(--space-4);font-size:var(--text-xs);border-radius:var(--radius-md) var(--radius-md) 0 0;
  color:var(--muted);font-weight:500;cursor:pointer;border:1px solid transparent;border-bottom:none;margin-bottom:-1px}
.tab:hover{color:var(--text);background:var(--surface3)}
.tab.active{background:var(--surface);color:var(--primary);border-color:var(--div);border-bottom-color:var(--surface)}

/* FILTER */
.filter-bar{display:flex;gap:var(--space-2);align-items:center;margin-bottom:var(--space-4);flex-wrap:wrap}
.chip{padding:var(--space-1) var(--space-3);border-radius:var(--radius-full);font-size:var(--text-xs);
  font-weight:600;cursor:pointer;border:1px solid var(--bdr);background:var(--surface);color:var(--muted)}
.chip:hover{border-color:var(--primary);color:var(--primary)}
.chip.active{background:var(--primary);border-color:var(--primary);color:#fff}
.search-inp{flex:1;min-width:180px;padding:var(--space-1) var(--space-3);
  border:1px solid var(--bdr);border-radius:var(--radius-full);
  background:var(--surface2);color:var(--text);font-size:var(--text-xs);outline:none}
.search-inp:focus{border-color:var(--primary)}
.btn-refresh{display:flex;align-items:center;gap:var(--space-1);padding:var(--space-1) var(--space-3);
  background:var(--primary);color:#fff;border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:600}
.btn-refresh:hover{background:var(--phover)}
.btn-refresh i{width:13px;height:13px}

/* TOPIC CARDS */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(340px,100%),1fr));gap:var(--space-4)}
.card{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius-lg);
  padding:var(--space-4);box-shadow:var(--sh1);cursor:pointer;
  display:flex;flex-direction:column;gap:var(--space-3)}
.card:hover{border-color:var(--primary);box-shadow:var(--sh2),0 0 0 1px var(--primary);transform:translateY(-1px)}
.card.sel{border-color:var(--primary);background:var(--phil)}
.topic-meta{display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap}
.ttag{font-size:var(--text-xs);font-weight:600;padding:2px 8px;border-radius:var(--radius-full);white-space:nowrap}
.t-cat{background:var(--phil);color:var(--primary)}
.t-hot{background:var(--adim);color:var(--accent)}
.t-new{background:var(--okdim);color:var(--ok)}
.t-trend{background:var(--wdim);color:var(--warn)}
.ttitle{font-size:var(--text-base);font-weight:600;line-height:1.4}
.tdesc{font-size:var(--text-xs);color:var(--muted);line-height:1.6}
.tstats{display:flex;gap:var(--space-4);margin-top:auto}
.stat{display:flex;align-items:center;gap:var(--space-1);font-size:var(--text-xs);color:var(--muted);font-variant-numeric:tabular-nums}
.stat i{width:11px;height:11px}
.hbar{height:3px;border-radius:var(--radius-full);background:var(--div);overflow:hidden}
.hfill{height:100%;border-radius:var(--radius-full);background:linear-gradient(90deg,var(--primary),var(--accent));transition:width .6s cubic-bezier(.16,1,.3,1)}
.card-actions{display:flex;gap:var(--space-2)}
.btn-gen{flex:1;padding:var(--space-2);background:var(--primary);color:#fff;
  border-radius:var(--radius-md);font-size:var(--text-xs);font-weight:600;
  display:flex;align-items:center;justify-content:center;gap:var(--space-1)}
.btn-gen:hover{background:var(--phover)}
.btn-gen i{width:12px;height:12px}
.btn-save{padding:var(--space-2) var(--space-3);border:1px solid var(--bdr);
  border-radius:var(--radius-md);font-size:var(--text-xs);color:var(--muted);
  display:flex;align-items:center;gap:var(--space-1)}
.btn-save:hover{border-color:var(--accent);color:var(--accent)}
.btn-save i{width:12px;height:12px}

/* SCRIPT PANEL */
.panel{position:fixed;right:0;top:49px;bottom:0;width:480px;
  background:var(--surface);border-left:1px solid var(--div);
  display:flex;flex-direction:column;transform:translateX(100%);
  transition:transform .35s cubic-bezier(.16,1,.3,1);z-index:200;box-shadow:var(--sh3)}
.panel.open{transform:translateX(0)}
.ph{padding:var(--space-4) var(--space-5);border-bottom:1px solid var(--div);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ph-title{font-size:var(--text-base);font-weight:700}
.ph-close{width:28px;height:28px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;color:var(--muted)}
.ph-close:hover{background:var(--surface3);color:var(--text)}
.pb{flex:1;overflow-y:auto;padding:var(--space-5);display:flex;flex-direction:column;gap:var(--space-4)}
.pf{padding:var(--space-4) var(--space-5);border-top:1px solid var(--div);display:flex;gap:var(--space-2);flex-shrink:0}

.stopic{display:inline-flex;align-items:center;gap:var(--space-1);padding:var(--space-1) var(--space-3);
  background:var(--phil);color:var(--primary);border-radius:var(--radius-full);
  font-size:var(--text-xs);font-weight:600;margin-bottom:var(--space-2)}
.ssec{background:var(--surface2);border:1px solid var(--div);border-radius:var(--radius-lg);overflow:hidden}
.ssec-hdr{padding:var(--space-3) var(--space-4);display:flex;align-items:center;gap:var(--space-2);
  border-bottom:1px solid var(--div);background:var(--surface3)}
.ssec-num{width:20px;height:20px;border-radius:var(--radius-full);background:var(--primary);color:#fff;
  font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ssec-lbl{font-size:var(--text-xs);font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.04em}
.ssec-sub{font-size:var(--text-xs);color:var(--faint);margin-left:auto}
.scontent{padding:var(--space-4)}
.stext{font-size:var(--text-sm);line-height:1.8;color:var(--text);white-space:pre-wrap;
  font-family:var(--font-body);border:none;background:none;width:100%;resize:none;outline:none;min-height:80px}
.shint{font-size:var(--text-xs);color:var(--faint);margin-top:var(--space-2);padding-top:var(--space-2);border-top:1px dashed var(--div)}

/* API SETUP */
.api-box{background:var(--surface2);border:1px solid var(--div);border-radius:var(--radius-lg);padding:var(--space-4)}
.api-title{font-size:var(--text-sm);font-weight:700;margin-bottom:var(--space-3);display:flex;align-items:center;gap:var(--space-2)}
.api-row{margin-bottom:var(--space-3)}
.api-lbl{font-size:var(--text-xs);color:var(--muted);font-weight:600;margin-bottom:var(--space-1)}
.api-inp{width:100%;padding:var(--space-2) var(--space-3);border:1px solid var(--bdr);
  border-radius:var(--radius-md);background:var(--surface);color:var(--text);
  font-size:var(--text-xs);font-family:var(--font-mono);outline:none}
.api-inp:focus{border-color:var(--primary)}
.api-sel{width:100%;padding:var(--space-2) var(--space-3);border:1px solid var(--bdr);
  border-radius:var(--radius-md);background:var(--surface);color:var(--text);
  font-size:var(--text-xs);outline:none;cursor:pointer}
.api-sel:focus{border-color:var(--primary)}
.api-note{font-size:var(--text-xs);color:var(--faint);margin-top:var(--space-1)}
.api-status{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-3);
  border-radius:var(--radius-md);font-size:var(--text-xs);margin-top:var(--space-2)}
.api-status.ok{background:var(--okdim);color:var(--ok)}
.api-status.err{background:var(--adim);color:var(--accent)}
.api-status.idle{background:var(--surface3);color:var(--muted)}

/* HOW-TO SETUP CARD */
.setup-card{background:var(--surface2);border:1px solid var(--div);border-radius:var(--radius-lg);padding:var(--space-5)}
.setup-title{font-size:var(--text-base);font-weight:700;margin-bottom:var(--space-4);display:flex;align-items:center;gap:var(--space-2)}
.setup-step{display:flex;gap:var(--space-3);margin-bottom:var(--space-4)}
.setup-step:last-child{margin-bottom:0}
.step-num{width:28px;height:28px;border-radius:var(--radius-full);background:var(--primary);color:#fff;
  font-size:var(--text-xs);font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-content{}
.step-title{font-size:var(--text-sm);font-weight:600;margin-bottom:var(--space-1)}
.step-desc{font-size:var(--text-xs);color:var(--muted);line-height:1.6}
.step-link{color:var(--primary);text-decoration:underline;cursor:pointer}
.code-block{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius-md);
  padding:var(--space-2) var(--space-3);font-family:var(--font-mono);font-size:var(--text-xs);
  color:var(--text);margin-top:var(--space-2);word-break:break-all;cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;gap:var(--space-2)}
.code-block i{width:12px;height:12px;flex-shrink:0;color:var(--muted)}
.divider{height:1px;background:var(--div);margin:var(--space-4) 0}

/* LOADING */
.dots{display:flex;gap:4px;align-items:center;padding:var(--space-4)}
.dots span{width:6px;height:6px;border-radius:50%;background:var(--primary);animation:bounce 1.2s ease-in-out infinite}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}

/* BUTTONS */
.btn-p{flex:1;padding:var(--space-2) var(--space-4);background:var(--primary);color:#fff;
  border-radius:var(--radius-md);font-size:var(--text-sm);font-weight:600;
  display:flex;align-items:center;justify-content:center;gap:var(--space-2)}
.btn-p:hover{background:var(--phover)}
.btn-p:disabled{opacity:.5;cursor:not-allowed}
.btn-s{padding:var(--space-2) var(--space-4);border:1px solid var(--bdr);
  border-radius:var(--radius-md);font-size:var(--text-sm);color:var(--muted)}
.btn-s:hover{border-color:var(--primary);color:var(--primary)}
.btn-full{width:100%;padding:var(--space-2) var(--space-4);background:var(--primary);color:#fff;
  border-radius:var(--radius-md);font-size:var(--text-sm);font-weight:600;
  display:flex;align-items:center;justify-content:center;gap:var(--space-2);margin-top:var(--space-3)}
.btn-full:hover{background:var(--phover)}
.btn-full:disabled{opacity:.5;cursor:not-allowed}

/* OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:150;opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.active{opacity:1;pointer-events:all}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;text-align:center;padding:var(--space-16) var(--space-8);color:var(--muted)}
.empty i{width:40px;height:40px;color:var(--faint);margin-bottom:var(--space-4)}
.empty p{max-width:30ch;font-size:var(--text-sm)}

/* ALERT */
.alert{padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);font-size:var(--text-xs);
  display:flex;align-items:flex-start;gap:var(--space-2);margin-bottom:var(--space-3)}
.alert i{width:14px;height:14px;flex-shrink:0;margin-top:1px}
.alert.info{background:var(--phil);color:var(--primary);border:1px solid rgba(108,140,255,.25)}
.alert.warn{background:var(--wdim);color:var(--warn);border:1px solid rgba(251,191,36,.25)}
.alert.ok{background:var(--okdim);color:var(--ok);border:1px solid rgba(74,222,128,.25)}

/* PROGRESS */
.progress{height:3px;background:var(--div);border-radius:var(--radius-full);overflow:hidden;margin-top:var(--space-2)}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:var(--radius-full);transition:width .4s}

@media(max-width:768px){
  .app{grid-template-columns:1fr}
  .sidebar{display:none}
  .main{padding:var(--space-4)}
  .panel{width:100%;top:0}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div class="app">

<!-- TOPBAR -->
<header class="topbar">
  <a class="logo" href="#">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-label="机械选题雷达">
      <circle cx="14" cy="14" r="12" stroke="currentColor" stroke-width="1.5" opacity="0.25"/>
      <circle cx="14" cy="14" r="7" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
      <circle cx="14" cy="14" r="2.5" fill="currentColor"/>
      <line x1="14" y1="2" x2="14" y2="6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="14" y1="22" x2="14" y2="26" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="2" y1="14" x2="6" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="22" y1="14" x2="26" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="14" y1="14" x2="19.5" y2="8.5" stroke="#6c8cff" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <div>
      <div class="logo-text">机械选题雷达</div>
      <div class="logo-sub">工科内容创作助手</div>
    </div>
  </a>
  <div class="topbar-right">

        <span class="ttag t-cat">${t.category}</span>

    "keywords": ["关键词1","关键词2","关键词3"]
  }
]`;

    const res=await callAI(prompt,800);

// ─── AI CORE ─────────────────────────────────────────────
async function callAI(prompt,maxTokens=1200){
  let url,headers,body;
  if(apiProvider==='perplexity'){
    url='https://api.perplexity.ai/chat/completions';
    headers={'Authorization':`Bearer ${apiKey}`,'Content-Type':'application/json'};
    body=JSON.stringify({model:'llama-3.1-sonar-large-128k-online',messages:[{role:'user',content:prompt}],max_tokens:maxTokens});
  } else if(apiProvider==='deepseek'){
    url='https://api.deepseek.com/chat/completions';
    headers={'Authorization':`Bearer ${apiKey}`,'Content-Type':'application/json'};
    body=JSON.stringify({model:'deepseek-chat',messages:[{role:'user',content:prompt}],max_tokens:maxTokens});
  } else {
    url='https://api.openai.com/v1/chat/completions';
    headers={'Authorization':`Bearer ${apiKey}`,'Content-Type':'application/json'};
    body=JSON.stringify({model:'gpt-4o-mini',messages:[{role:'user',content:prompt}],max_tokens:maxTokens});
  }
  const res=await fetch(url,{method:'POST',headers,body});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error?.message||`HTTP ${res.status}`);}
  const data=await res.json();
  return data.choices?.[0]?.message?.content||'';
}

async function generateScript(){
  if(!apiKey){alert('请先在「⚙ API 设置」标签中配置 API Key。\n\n当前显示的是内置模板脚本，可直接编辑使用。');return;}
  const btn=document.getElementById('genBtn');
  btn.disabled=true;btn.innerHTML='<i data-lucide="loader-2" style="width:15px;height:15px"></i> 生成中…';lucide.createIcons();
  setStatus('正在生成脚本…','loading');
  try{
    const prompt=`你是专注机械工程知识科普的小红书博主，人设是「机械工程应届生」，用工科专业背景讲通俗故事。

请为以下选题生成一篇小红书笔记脚本，严格按格式输出：

选题：${cur.title}
创作角度：${cur.angle}
核心关键词：${cur.keywords.join('、')}

输出格式（严格遵守，每段之间空一行）：
[钩子句]
（2-3句，制造悬念或反常识冲击，让人想继续看）

[核心知识点]
（机械工程视角，3-4个编号知识点，每点有通俗类比，避免只堆术语）

[结尾CTA]
（自然收尾，引导收藏+评论，带上「机械工程应届生」人设，1-2句）`;

    const text=await callAI(prompt,1200);
    const hookM=text.match(/\[钩子句\]([\s\S]*?)(?=\[核心知识点\]|$)/);
    const coreM=text.match(/\[核心知识点\]([\s\S]*?)(?=\[结尾CTA\]|$)/);
    const ctaM=text.match(/\[结尾CTA\]([\s\S]*?)$/);
    if(hookM)setSec('sHook',hookM[1].trim());
    if(coreM)setSec('sCore',coreM[1].trim());
    if(ctaM)setSec('sCTA',ctaM[1].trim());
    else if(!hookM&&!coreM)setSec('sCore',text);
    setStatus('脚本生成完成 ✓','ok');
  }catch(e){
    setStatus('生成失败','err');
    alert('AI 生成失败：'+e.message);
  }
  btn.disabled=false;btn.innerHTML='<i data-lucide="sparkles" style="width:15px;height:15px"></i> 重新生成';lucide.createIcons();
}

function copyScript(){
  const texts=[...document.querySelectorAll('.stext')].map(t=>t.value).join('\n\n---\n\n');
  if(!texts.trim()){alert('还没有脚本内容');return;}
  navigator.clipboard.writeText(texts).then(()=>{
    const btn=document.querySelector('.btn-s');
    const orig=btn.textContent;btn.textContent='✅ 已复制';
    setTimeout(()=>{btn.textContent=orig;},2000);
  });
}

  TOPICS.forEach(t=>{
    if(t.heat<=70) counts[0]++;
    else if(t.heat<=75) counts[1]++;
    else if(t.heat<=80) counts[2]++;
    else if(t.heat<=85) counts[3]++;
    else if(t.heat<=90) counts[4]++;
    else counts[5]++;
  });
  _charts.hist = new Chart(document.getElementById('cHist'), {
    type:'bar',
    data:{
      labels:ranges,
      datasets:[{label:'话题数',data:counts, backgroundColor:c3+'aa', borderColor:c3, borderWidth:1.5, borderRadius:4}]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{grid:{display:false},ticks:{color:tc}},
        y:{grid:{color:gc},ticks:{color:tc,stepSize:1}}
      }
    }
  });
}

// ─── EXPORT SCRIPT ─────────────────────────────────────
function exportScript() {
  const texts = [...document.querySelectorAll('.stext')].map(t => t.value);
  if (!texts.some(t => t.trim())) { alert('请先生成脚本内容再导出。'); return; }
  const title = cur ? cur.title : '未命名选题';
  const d = new Date();
  const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const fmt = confirm('导出格式：\n\n确定 → Markdown (.md)，支持 Notion/Obsidian\n取消 → 纯文本 (.txt)') ? 'md' : 'txt';
  let content, filename;
  if (fmt === 'md') {
    content = `# ${title}\n\n> 生成时间：${ds}\n\n---\n\n## 🪝 钩子句\n\n${texts[0]||''}\n\n---\n\n## 📚 核心知识点\n\n${texts[1]||''}\n\n---\n\n## 🎯 结尾 CTA\n\n${texts[2]||''}\n`;
    filename = `script-${ds}.md`;
  } else {
    content = `选题：${title}\n生成时间：${ds}\n\n${'='.repeat(40)}\n\n【钩子句】\n${texts[0]||''}\n\n${'─'.repeat(40)}\n\n【核心知识点】\n${texts[1]||''}\n\n${'─'.repeat(40)}\n\n【结尾 CTA】\n${texts[2]||''}\n`;
    filename = `script-${ds}.txt`;
  }
  const blob = new Blob([content], {type:'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  const btn = [...document.querySelectorAll('button')].find(b=>b.onclick&&b.onclick.toString().includes('exportScript'));
  if(btn){const o=btn.innerHTML;btn.innerHTML='✅ 已导出';setTimeout(()=>{btn.innerHTML=o;},2000);}
}

// ─── AUTO-REFRESH ──────────────────────────────────────
let _autoTimer=null, _cdownTimer=null, _cdownSec=0;
function startAutoRefresh(mins) {
  stopAutoRefresh();
  const ms = mins * 60 * 1000;
  _cdownSec = mins * 60;
  const badge = document.getElementById('refreshBadge');
  if(badge){ badge.style.display='flex'; }
  _cdownTimer = setInterval(() => {
    _cdownSec--; if(_cdownSec<=0) _cdownSec=mins*60;
    const m=Math.floor(_cdownSec/60), s=String(_cdownSec%60).padStart(2,'0');
    const el=document.getElementById('countdownTxt');
    if(el) el.textContent=m>0?`${m}m${s}s`:`0m${s}s`;
  }, 1000);
  _autoTimer = setInterval(()=>{
    if(apiKey) fetchLiveTopics();
    else setStatus('自动刷新跳过：需配置 API Key','');
  }, ms);
  setStatus(`✅ 自动刷新已开启，每 ${mins} 分钟更新一次`,'ok');
}
function stopAutoRefresh() {
  if(_autoTimer){clearInterval(_autoTimer);_autoTimer=null;}
  if(_cdownTimer){clearInterval(_cdownTimer);_cdownTimer=null;}
  const badge=document.getElementById('refreshBadge');
  if(badge) badge.style.display='none';
  if(_autoTimer===null&&_cdownTimer===null) setStatus('自动刷新已停止','');
}
